<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>お問い合わせ - VALIARK</title>
    <meta name="description" content="構想段階から相談可能。AI開発、技術責任の委託についてお気軽にご相談ください。" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="header-container"></div>

    <section class="page-header">
      <div class="container">
        <h1 class="page-title">お問い合わせ</h1>
        <p class="page-subtitle">Contact</p>
        <div class="page-philosophy">
          <p>構想段階から相談可能です。技術責任の引き受けについてお気軽にご連絡ください。</p>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <p class="section-text large">
          設計から実装、運用まで。AI基盤設計、サービス基盤構築、CTO機能提供について、構想段階からのご相談を承ります。
        </p>
      </div>
    </section>

    <section class="section bg-subtle">
      <div class="container">
        <div class="contact-form-container">
          <form
            class="contact-form"
            id="contactForm"
            action="https://formspree.io/f/mvgveqnq"
            method="POST"
          >
            <div class="form-group">
              <label class="form-label">お問い合わせ種別 <span class="required">*</span></label>
              <div class="radio-group">
                <label class="radio-label">
                  <input type="radio" name="inquiryType" value="ai-development" required />
                  <span class="radio-custom"></span>
                  AI開発・基盤設計の相談
                </label>
                <label class="radio-label">
                  <input type="radio" name="inquiryType" value="cto-advisory" required />
                  <span class="radio-custom"></span>
                  CTO機能・技術アドバイザリー
                </label>
                <label class="radio-label">
                  <input type="radio" name="inquiryType" value="education" required />
                  <span class="radio-custom"></span>
                  教育機関・地域プロジェクト
                </label>
                <label class="radio-label">
                  <input type="radio" name="inquiryType" value="other" required />
                  <span class="radio-custom"></span>
                  その他
                </label>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="lastName" class="form-label">姓 <span class="required">*</span></label>
                <input type="text" id="lastName" name="lastName" class="form-input" required />
              </div>
              <div class="form-group">
                <label for="firstName" class="form-label">名 <span class="required">*</span></label>
                <input type="text" id="firstName" name="firstName" class="form-input" required />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="email" class="form-label">メールアドレス <span class="required">*</span></label>
                <input type="email" id="email" name="email" class="form-input" required />
              </div>
              <div class="form-group">
                <label for="phone" class="form-label">電話番号</label>
                <input type="tel" id="phone" name="phone" class="form-input" />
              </div>
            </div>

            <div class="form-group">
              <label for="company" class="form-label">会社名・団体名</label>
              <input type="text" id="company" name="company" class="form-input" />
            </div>

            <div class="form-group">
              <label for="subject" class="form-label">件名 <span class="required">*</span></label>
              <input type="text" id="subject" name="subject" class="form-input" required />
            </div>

            <div class="form-group">
              <label for="message" class="form-label">お問い合わせ内容 <span class="required">*</span></label>
              <textarea
                id="message"
                name="message"
                class="form-textarea"
                rows="8"
                required
                placeholder="プロジェクトの概要、ご相談内容、予想されるスケジュールなどをご記入ください。"
              ></textarea>
            </div>

            <div class="form-group">
              <label class="checkbox-label">
                <input type="checkbox" name="privacy" required />
                <span class="checkbox-custom"></span>
                <a href="#" class="privacy-link">プライバシーポリシー</a>に同意します <span class="required">*</span>
              </label>
            </div>

            <input type="text" name="_gotcha" style="position:absolute;left:-9999px;width:1px;height:1px" tabindex="-1" autocomplete="off" />

            <div class="form-submit">
              <button type="submit" class="btn btn-primary btn-large" id="submitButton">送信する</button>
            </div>
            <p id="formStatus" class="form-status"></p>
          </form>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <p class="section-text" style="text-align:center">
          通常2営業日以内にご返信いたします。<br />
          <a href="mailto:contact@valiark.jp" style="color:var(--color-accent)">contact@valiark.jp</a>
        </p>
      </div>
    </section>

    <footer class="footer">
      <div class="container">
        <div class="footer-content">
          <div class="footer-logo">
            <a href="index.html"><img src="images/valiark.logo.svg" alt="VALIARK" class="logo" /></a>
          </div>
          <nav class="footer-nav">
            <a href="index.html" class="footer-link">ホーム</a>
            <a href="about.html" class="footer-link">私たちについて</a>
            <a href="services.html" class="footer-link">事業内容</a>
            <a href="works.html" class="footer-link">実績紹介</a>
            <a href="contact.html" class="footer-link">お問い合わせ</a>
          </nav>
        </div>
        <div class="footer-bottom">
          <p class="copyright">© 2025 VALIARK</p>
        </div>
      </div>
    </footer>

    <script src="js/header.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
